# Dependabot version updates — auto-generated by dep-audit.
# Grouping: one grouped PR per ecosystem per week, except multi-directory
# gomod / docker / npm (ungrouped due to upstream Dependabot bugs). Full
# rationale and issue links: https://github.com/happyreturns/operations/tree/main/dep_audit#dependabot-yml-generator
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    groups:
      all-dependencies:
        patterns:
          - "*"

